name: Integration Test

on:
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Run integration tests
        run: bash test/run-tests.sh

      - name: Cleanup
        if: always()
        run: bash test/run-tests.sh cleanup
