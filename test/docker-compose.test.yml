# Compose override for integration tests.
#
# Adds a shared "fmsg-test" Docker network so the two fmsgd instances
# (hairpin.local and example.com) can discover each other via Docker DNS
# using network aliases — no /etc/hosts manipulation required.
#
# Parameterised by environment variables:
#   FMSG_DOMAIN              – the domain this instance serves (used as network alias)
#   FMSG_WEBAPI_HOST_PORT    – host port mapped to fmsg-webapi
#   FMSG_API_PORT            – port webapi listens on inside container (default 8000)

services:

  certbot:
    entrypoint: ["true"]
    restart: "no"
    ports: !override []

  fmsgd:
    environment:
      FMSG_TLS_CERT: /opt/fmsg/tls/fmsg.${FMSG_DOMAIN}.crt
      FMSG_TLS_KEY: /opt/fmsg/tls/fmsg.${FMSG_DOMAIN}.key
      FMSG_TLS_INSECURE_SKIP_VERIFY: "true"
    volumes:
      - ../test/.tls:/opt/fmsg/tls:ro,z
    # Short (list) form so this fully replaces the base depends_on (dropping
    # certbot, which is stubbed out below) instead of merging with it.
    depends_on: !override [postgres, fmsgid]
    networks:
      default:
      fmsg-test:
        aliases:
          - ${FMSG_DOMAIN}
          - fmsg.${FMSG_DOMAIN}

  fmsg-webapi:
    environment:
      FMSG_TLS_CERT: ""
      FMSG_TLS_KEY: ""
    depends_on: !override [fmsgd, fmsgid]
    ports: !override
      - "${FMSG_WEBAPI_HOST_PORT:-8081}:${FMSG_API_PORT:-8000}"

networks:
  default:
  fmsg-test:
    external: true
