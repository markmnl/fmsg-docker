services:

  certbot:
    image: certbot/certbot
    restart: "no"
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      FMSG_DOMAIN: ${FMSG_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ../docker/certbot/entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "80:80"

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: postgres
      FMSGD_WRITER_PGPASSWORD: ${FMSGD_WRITER_PGPASSWORD}
      FMSGD_READER_PGPASSWORD: ${FMSGD_READER_PGPASSWORD}
      FMSGID_WRITER_PGPASSWORD: ${FMSGID_WRITER_PGPASSWORD}
      FMSGID_READER_PGPASSWORD: ${FMSGID_READER_PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fmsgid:
    build:
      context: ../docker/fmsgid
      dockerfile: Dockerfile
      args:
        FMSGID_REF: ${FMSGID_REF:-main}
        CACHEBUST: ${CACHEBUST:-}
    restart: unless-stopped
    environment:
      GIN_MODE: ${GIN_MODE:-release}
      FMSGID_PORT: ${FMSGID_PORT:-8080}
      FMSGID_CSV_FILE: /opt/fmsgid/data/addresses.csv
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: fmsgid
      PGUSER: fmsgid_writer
      PGPASSWORD: ${FMSGID_WRITER_PGPASSWORD}
      PGSSLMODE: disable
    volumes:
      - fmsgid_data:/opt/fmsgid/data
    depends_on:
      postgres:
        condition: service_healthy

  fmsgd:
    build:
      context: ../docker/fmsgd
      dockerfile: Dockerfile
      args:
        FMSGD_REF: ${FMSGD_REF:-main}
        CACHEBUST: ${CACHEBUST:-}
    restart: unless-stopped
    environment:
      FMSG_DOMAIN: ${FMSG_DOMAIN}
      FMSG_DATA_DIR: /opt/fmsg/data
      FMSG_ID_URL: http://fmsgid:${FMSGID_PORT:-8080}
      FMSG_SKIP_DOMAIN_IP_CHECK: ${FMSG_SKIP_DOMAIN_IP_CHECK:-false}
      FMSG_SKIP_AUTHORISED_IPS: ${FMSG_SKIP_AUTHORISED_IPS:-false}
      FMSG_TLS_CERT: /etc/letsencrypt/live/fmsg.${FMSG_DOMAIN}/fullchain.pem
      FMSG_TLS_KEY: /etc/letsencrypt/live/fmsg.${FMSG_DOMAIN}/privkey.pem
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: fmsgd
      PGUSER: fmsgd_writer
      PGPASSWORD: ${FMSGD_WRITER_PGPASSWORD}
      PGSSLMODE: disable
    volumes:
      - fmsg_data:/opt/fmsg/data
      - letsencrypt:/etc/letsencrypt:ro
    ports:
      - "${FMSG_PORT:-4930}:4930"
    depends_on:
      certbot:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      fmsgid:
        condition: service_started

  fmsg-webapi:
    build:
      context: ../docker/fmsg-webapi
      dockerfile: Dockerfile
      args:
        FMSG_WEBAPI_REF: ${FMSG_WEBAPI_REF:-main}
        CACHEBUST: ${CACHEBUST:-}
    restart: unless-stopped
    environment:
      FMSG_DOMAIN: ${FMSG_DOMAIN}
      FMSG_ID_URL: http://fmsgid:${FMSGID_PORT:-8080}
      FMSG_API_JWT_SECRET: ${FMSG_API_JWT_SECRET}
      FMSG_API_PORT: ${FMSG_API_PORT:-8000}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: fmsgd
      PGUSER: fmsgd_writer
      PGPASSWORD: ${FMSGD_WRITER_PGPASSWORD}
      FMSG_TLS_CERT: /etc/letsencrypt/live/fmsgapi.${FMSG_DOMAIN}/fullchain.pem
      FMSG_TLS_KEY: /etc/letsencrypt/live/fmsgapi.${FMSG_DOMAIN}/privkey.pem
      FMSG_DATA_DIR: /opt/fmsg/data
      PGSSLMODE: disable
    volumes:
      - fmsg_data:/opt/fmsg/data
      - letsencrypt:/etc/letsencrypt:ro
    ports:
      - "443:443"
    depends_on:
      certbot:
        condition: service_completed_successfully
      fmsgd:
        condition: service_started
      fmsgid:
        condition: service_started

volumes:
  postgres_data:
  fmsg_data:
  fmsgid_data:
  letsencrypt:
