services:

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: postgres
      FMSGD_WRITER_PGPASSWORD: ${FMSGD_WRITER_PGPASSWORD}
      FMSGD_READER_PGPASSWORD: ${FMSGD_READER_PGPASSWORD}
      FMSGID_WRITER_PGPASSWORD: ${FMSGID_WRITER_PGPASSWORD}
      FMSGID_READER_PGPASSWORD: ${FMSGID_READER_PGPASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fmsgid:
    build:
      context: ../docker/fmsgid
      dockerfile: Dockerfile
      args:
        FMSGID_REF: ${FMSGID_REF:-main}
    restart: unless-stopped
    environment:
      GIN_MODE: ${GIN_MODE:-release}
      FMSGID_PORT: ${FMSGID_PORT:-8080}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: fmsgid
      PGUSER: fmsgid_writer
      PGPASSWORD: ${FMSGID_WRITER_PGPASSWORD}
      PGSSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  fmsgd:
    build:
      context: ../docker/fmsgd
      dockerfile: Dockerfile
      args:
        FMSGD_REF: ${FMSGD_REF:-main}
    restart: unless-stopped
    environment:
      FMSG_DOMAIN: ${FMSG_DOMAIN}
      FMSG_DATA_DIR: /opt/fmsg/data
      FMSG_ID_URL: http://fmsgid:${FMSGID_PORT:-8080}
      FMSG_SKIP_DOMAIN_IP_CHECK: ${FMSG_SKIP_DOMAIN_IP_CHECK:-false}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: fmsgd
      PGUSER: fmsgd_writer
      PGPASSWORD: ${FMSGD_WRITER_PGPASSWORD}
      PGSSLMODE: disable
    volumes:
      - fmsg_data:/opt/fmsg/data
    ports:
      - "${FMSG_PORT:-4930}:4930"
    depends_on:
      postgres:
        condition: service_healthy
      fmsgid:
        condition: service_started

  fmsg-webapi:
    build:
      context: ../docker/fmsg-webapi
      dockerfile: Dockerfile
      args:
        FMSG_WEBAPI_REF: ${FMSG_WEBAPI_REF:-main}
    restart: unless-stopped
    environment:
      FMSG_DOMAIN: ${FMSG_DOMAIN}
      FMSG_ID_URL: http://fmsgid:${FMSGID_PORT:-8080}
      FMSG_API_JWT_SECRET: ${FMSG_API_JWT_SECRET}
      FMSG_API_PORT: ${FMSG_API_PORT:-8000}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: fmsgd
      PGUSER: fmsgd_writer
      PGPASSWORD: ${FMSGD_WRITER_PGPASSWORD}
      FMSG_DATA_DIR: /opt/fmsg/data
      PGSSLMODE: disable
    volumes:
      - fmsg_data:/opt/fmsg/data
    depends_on:
      - fmsgd
      - fmsgid

volumes:
  postgres_data:
  fmsg_data:
